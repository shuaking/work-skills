
name: Deploy SKIILs to GitHub Pages (v0.4.2 改进版)

on:
  push:
    branches: [ main ]
    paths: [ 'docs/**', 'src/skiils/skills/**', 'scripts/**', '.github/workflows/deploy-pages.yml' ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 🔧 确保 docs 文件夹存在
        run: |
          if [ ! -d docs ]; then
            echo "❌ docs 目录不存在"
            exit 1
          fi
          if [ ! -f docs/index.html ]; then
            echo "❌ docs/index.html 不存在"
            exit 1
          fi
          echo "✅ docs 目录结构："
          ls -la docs/

      - name: 🐍 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🔄 生成技能元数据
        run: |
          echo "开始生成 skills.json..."
          python scripts/generate_skills_json.py
          if [ -f docs/skills.json ]; then
            echo "✅ skills.json 生成成功"
            cat docs/skills.json
          else
            echo "❌ skills.json 生成失败"
            exit 1
          fi

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4