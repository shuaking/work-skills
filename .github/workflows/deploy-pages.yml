
name: Deploy SKIILs to GitHub Pages (v0.4.2 改进版)

on:
  push:
    branches: [ main ]
    paths: [ 'docs/**', '.github/workflows/deploy-pages.yml' ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 🔧 确保 docs 文件夹存在
        run: |
          if [ ! -d docs ]; then
            echo "❌ docs 目录不存在"
            exit 1
          fi
          if [ ! -f docs/index.html ]; then
            echo "❌ docs/index.html 不存在"
            exit 1
          fi
          echo "✅ docs 目录结构："
          ls -la docs/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4