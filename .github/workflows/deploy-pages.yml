
name: Deploy SKIILs to GitHub Pages (v0.4.2 改进版)

on:
  push:
    branches: [ main ]
    paths: [ 'docs/**', '.github/workflows/deploy-pages.yml' ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 仓库
        uses: actions/checkout@v4

      - name: 🔧 确保 docs 文件夹存在（改进核心）
        run: |
          mkdir -p docs
          echo "📁 docs 文件夹已确认存在"
          ls -la docs/
          if [ ! -f docs/index.html ]; then
            echo "⚠️ 未找到 index.html → 自动生成兜底首页..."
            cat > docs/index.html << 'EOL'
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKIILs - 多技能工具库</title>
  <style>body{font-family:system-ui,sans-serif;background:#111;color:#fff;text-align:center;padding:100px;}</style>
</head>
<body>
  <h1>🚀 SKIILs 官网</h1>
  <p>GitHub Pages 部署成功！</p>
  <p>请检查本地 docs/index.html 是否已 push</p>
  <p><a href="https://github.com/${{ github.repository }}" style="color:#6366f1;">返回 GitHub 仓库</a></p>
</body>
</html>
EOL
          fi
          echo "✅ 最终 docs 目录结构："
          ls -la docs/

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4